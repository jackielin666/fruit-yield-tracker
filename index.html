<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五惠食品 — 原料處理記錄</title>
<style>
  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --success: #16a34a;
    --warning: #d97706;
    --danger: #dc2626;
    --bg: #f8fafc;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --text-muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
    color: white; padding: 16px 24px;
    display: flex; align-items: center; gap: 12px;
  }
  header h1 { font-size: 1.2rem; font-weight: 600; }
  header p { font-size: 0.8rem; opacity: 0.8; }

  .container { max-width: 720px; margin: 0 auto; padding: 24px 16px; }

  /* Progress Steps */
  .steps { display: flex; align-items: center; margin-bottom: 28px; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; position: relative; }
  .step:not(:last-child)::after {
    content: ''; position: absolute; top: 16px; left: 60%; width: 80%;
    height: 2px; background: var(--border); z-index: 0;
  }
  .step.done:not(:last-child)::after { background: var(--primary); }
  .step-num {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--border); color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.85rem; z-index: 1; position: relative;
    transition: all 0.3s;
  }
  .step.active .step-num { background: var(--primary); color: white; }
  .step.done .step-num { background: var(--success); color: white; }
  .step-label { font-size: 0.7rem; color: var(--text-muted); text-align: center; white-space: nowrap; }
  .step.active .step-label { color: var(--primary); font-weight: 600; }

  /* Card */
  .card {
    background: var(--card); border-radius: 12px;
    border: 1px solid var(--border); padding: 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .card-title { font-size: 1rem; font-weight: 700; margin-bottom: 20px; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .card-title .icon { font-size: 1.2rem; }

  /* Form */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 0.82rem; font-weight: 600; color: var(--text-muted); }
  label .required { color: var(--danger); margin-left: 2px; }
  input, select, textarea {
    padding: 10px 12px; border: 1.5px solid var(--border);
    border-radius: 8px; font-size: 0.92rem; color: var(--text);
    background: white; transition: border-color 0.2s;
    width: 100%;
  }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
  }
  input[type="number"] { text-align: right; }

  /* Pomelo special */
  .pomelo-section {
    background: #fef3c7; border: 1px solid #f59e0b;
    border-radius: 8px; padding: 16px; margin-top: 8px;
  }
  .pomelo-section h4 { font-size: 0.85rem; font-weight: 700; color: #92400e; margin-bottom: 12px; }

  /* Yield display */
  .yield-box {
    background: #f0fdf4; border: 1px solid #86efac;
    border-radius: 8px; padding: 16px; margin-top: 8px;
  }
  .yield-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
  .yield-label { font-size: 0.85rem; color: var(--text-muted); }
  .yield-value { font-size: 1rem; font-weight: 700; color: var(--success); }

  /* Radish flow */
  .flow-steps { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin: 12px 0; }
  .flow-step { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 20px; padding: 4px 12px; font-size: 0.78rem; font-weight: 600; color: var(--primary); }
  .flow-arrow { color: var(--text-muted); font-size: 0.85rem; }

  /* Buttons */
  .btn-row { display: flex; gap: 12px; margin-top: 24px; justify-content: flex-end; }
  .btn {
    padding: 10px 24px; border-radius: 8px; font-size: 0.9rem;
    font-weight: 600; cursor: pointer; border: none; transition: all 0.2s;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-secondary:hover { background: #cbd5e1; }
  .btn-success { background: var(--success); color: white; }
  .btn-success:hover { background: #15803d; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Status */
  .status-bar {
    padding: 12px 16px; border-radius: 8px; font-size: 0.88rem;
    font-weight: 500; display: none; margin-top: 16px; align-items: center; gap: 8px;
  }
  .status-bar.show { display: flex; }
  .status-bar.loading { background: #eff6ff; color: var(--primary); border: 1px solid #bfdbfe; }
  .status-bar.success { background: #f0fdf4; color: var(--success); border: 1px solid #86efac; }
  .status-bar.error { background: #fef2f2; color: var(--danger); border: 1px solid #fca5a5; }

  /* Summary */
  .summary-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
  .summary-table th, .summary-table td {
    padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border);
    font-size: 0.88rem;
  }
  .summary-table th { background: #f8fafc; color: var(--text-muted); font-weight: 600; }
  .summary-table td:last-child { font-weight: 600; text-align: right; }

  .hidden { display: none !important; }

  /* Spinner */
  .spinner { width: 18px; height: 18px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div style="font-size:1.8rem">🏭</div>
  <div>
    <h1>五惠食品 — 原料處理記錄</h1>
    <p>智慧步留率管理系統 v2.0</p>
  </div>
</header>

<div class="container">

  <!-- Steps -->
  <div class="steps" id="stepsBar">
    <div class="step active" id="s1"><div class="step-num">1</div><div class="step-label">批次基本</div></div>
    <div class="step" id="s2"><div class="step-num">2</div><div class="step-label">原料資訊</div></div>
    <div class="step" id="s3"><div class="step-num">3</div><div class="step-label">處理結果</div></div>
    <div class="step" id="s4"><div class="step-num">4</div><div class="step-label">品質記錄</div></div>
    <div class="step" id="s5"><div class="step-num">5</div><div class="step-label">確認送出</div></div>
  </div>

  <!-- Step 1: 批次基本 -->
  <div class="card" id="page1">
    <div class="card-title"><span class="icon">📋</span>批次基本資料</div>
    <div class="form-grid">
      <div class="form-group">
        <label>批次編號<span class="required">*</span></label>
        <input type="text" id="batchId" placeholder="例：B023" />
      </div>
      <div class="form-group">
        <label>處理日期<span class="required">*</span></label>
        <input type="date" id="processDate" />
      </div>
      <div class="form-group">
        <label>原料種類<span class="required">*</span></label>
        <select id="fruitType" onchange="onFruitChange()">
          <option value="">請選擇...</option>
          <option value="柚子">🍊 柚子</option>
          <option value="蘋果">🍎 蘋果</option>
          <option value="芒果">🥭 芒果</option>
          <option value="奇異果">🥝 奇異果</option>
          <option value="橘子">🍊 橘子</option>
          <option value="蘿蔔">🥕 蘿蔔</option>
        </select>
      </div>
      <div class="form-group">
        <label>操作人員<span class="required">*</span></label>
        <input type="text" id="operator" placeholder="例：登威" />
      </div>
      <div class="form-group full">
        <label>備註</label>
        <input type="text" id="notes1" placeholder="選填..." />
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="goStep(2)">下一步 →</button>
    </div>
  </div>

  <!-- Step 2: 原料資訊 -->
  <div class="card hidden" id="page2">
    <div class="card-title"><span class="icon">🌿</span>原料來源資訊</div>
    <div class="form-grid">
      <div class="form-group">
        <label>供應商</label>
        <input type="text" id="supplier" placeholder="供應商名稱" />
      </div>
      <div class="form-group">
        <label>原料等級</label>
        <select id="grade">
          <option value="A">A 級</option>
          <option value="B">B 級</option>
          <option value="C">C 級</option>
        </select>
      </div>
      <div class="form-group">
        <label>原料狀態</label>
        <select id="rawCondition">
          <option value="良好">良好</option>
          <option value="普通">普通</option>
          <option value="偏差">偏差</option>
        </select>
      </div>
      <div class="form-group">
        <label>產地</label>
        <input type="text" id="origin" placeholder="例：台南、進口" />
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="goStep(1)">← 上一步</button>
      <button class="btn btn-primary" onclick="goStep(3)">下一步 →</button>
    </div>
  </div>

  <!-- Step 3: 處理結果 -->
  <div class="card hidden" id="page3">
    <div class="card-title"><span class="icon">⚖️</span>處理重量記錄</div>
    <div class="form-grid">
      <div class="form-group">
        <label>投入重量 (kg)<span class="required">*</span></label>
        <input type="number" id="inputWeight" step="0.1" min="0" oninput="calcYield()" placeholder="0.0" />
      </div>
      <div class="form-group">
        <label>處理時間 (分鐘)</label>
        <input type="number" id="processTime" min="0" placeholder="0" />
      </div>

      <!-- 一般水果輸出 -->
      <div class="form-group hidden" id="normalOutput">
        <label>產出重量 (kg)<span class="required">*</span></label>
        <input type="number" id="outputWeight" step="0.1" min="0" oninput="calcYield()" placeholder="0.0" />
      </div>

      <!-- 蘿蔔流程 -->
      <div class="form-group full hidden" id="radishSection">
        <div class="flow-steps">
          <div class="flow-step">切削</div><div class="flow-arrow">→</div>
          <div class="flow-step">清洗</div><div class="flow-arrow">→</div>
          <div class="flow-step">切塊</div><div class="flow-arrow">→</div>
          <div class="flow-step">切角</div><div class="flow-arrow">→</div>
          <div class="flow-step">秤重</div>
        </div>
        <div class="form-grid" style="margin-top:8px">
          <div class="form-group">
            <label>切削後 (kg)</label>
            <input type="number" id="r1" step="0.1" oninput="calcYield()" placeholder="0.0" />
          </div>
          <div class="form-group">
            <label>清洗後 (kg)</label>
            <input type="number" id="r2" step="0.1" oninput="calcYield()" placeholder="0.0" />
          </div>
          <div class="form-group">
            <label>切塊後 (kg)</label>
            <input type="number" id="r3" step="0.1" oninput="calcYield()" placeholder="0.0" />
          </div>
          <div class="form-group">
            <label>最終產出 (kg)<span class="required">*</span></label>
            <input type="number" id="r4" step="0.1" oninput="calcYield()" placeholder="0.0" />
          </div>
        </div>
      </div>

      <!-- 柚子特殊輸出 -->
      <div class="form-group full hidden" id="pomeloSection">
        <div class="pomelo-section">
          <h4>🍊 柚子分項記錄</h4>
          <div class="form-grid">
            <div class="form-group">
              <label>柚皮重量 (kg)</label>
              <input type="number" id="p_peel" step="0.1" oninput="calcPomelo()" placeholder="0.0" />
            </div>
            <div class="form-group">
              <label>柚脖重量 (kg)</label>
              <input type="number" id="p_neck" step="0.1" oninput="calcPomelo()" placeholder="0.0" />
            </div>
            <div class="form-group">
              <label>柚肉重量 (kg)</label>
              <input type="number" id="p_flesh" step="0.1" oninput="calcPomelo()" placeholder="0.0" />
            </div>
            <div class="form-group">
              <label>廢棄重量 (kg)</label>
              <input type="number" id="p_waste" step="0.1" oninput="calcPomelo()" placeholder="0.0" />
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 步留率顯示 -->
    <div class="yield-box" id="yieldBox" style="display:none">
      <div id="yieldContent"></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-secondary" onclick="goStep(2)">← 上一步</button>
      <button class="btn btn-primary" onclick="goStep(4)">下一步 →</button>
    </div>
  </div>

  <!-- Step 4: 品質記錄 -->
  <div class="card hidden" id="page4">
    <div class="card-title"><span class="icon">✅</span>品質與異常記錄</div>
    <div class="form-grid">
      <div class="form-group">
        <label>品質評等</label>
        <select id="quality">
          <option value="優">優</option>
          <option value="良">良</option>
          <option value="可">可</option>
          <option value="差">差</option>
        </select>
      </div>
      <div class="form-group">
        <label>是否有異常？</label>
        <select id="hasAnomaly" onchange="toggleAnomaly()">
          <option value="否">否</option>
          <option value="是">是</option>
        </select>
      </div>
      <div class="form-group full hidden" id="anomalyDetail">
        <label>異常說明</label>
        <textarea id="anomalyText" rows="3" placeholder="請描述異常情況..."></textarea>
      </div>
      <div class="form-group full">
        <label>現場備註</label>
        <textarea id="notes2" rows="2" placeholder="其他補充說明..."></textarea>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="goStep(3)">← 上一步</button>
      <button class="btn btn-primary" onclick="goStep(5)">下一步 →</button>
    </div>
  </div>

  <!-- Step 5: 確認送出 -->
  <div class="card hidden" id="page5">
    <div class="card-title"><span class="icon">📤</span>確認並送出</div>
    <table class="summary-table" id="summaryTable"></table>

    <div id="statusBar" class="status-bar"></div>

    <div class="btn-row">
      <button class="btn btn-secondary" onclick="goStep(4)">← 上一步</button>
      <button class="btn btn-success" id="submitBtn" onclick="submitData()">✓ 確認送出</button>
    </div>
  </div>

</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzp8GhrGvXay8HiQFBHDzmz6zZY1X5YYlr0TB_XBW6B-iueOyOHAUNJSSvF6qTUZAAdqA/exec';

let currentStep = 1;

function goStep(n) {
  if (n > currentStep && !validateStep(currentStep)) return;
  currentStep = n;
  for (let i = 1; i <= 5; i++) {
    document.getElementById('page' + i).classList.toggle('hidden', i !== n);
    const s = document.getElementById('s' + i);
    s.className = 'step' + (i < n ? ' done' : i === n ? ' active' : '');
  }
  if (n === 5) buildSummary();
}

function validateStep(n) {
  if (n === 1) {
    if (!v('batchId')) return alert('請填寫批次編號'), false;
    if (!v('processDate')) return alert('請選擇處理日期'), false;
    if (!v('fruitType')) return alert('請選擇原料種類'), false;
    if (!v('operator')) return alert('請填寫操作人員'), false;
  }
  if (n === 3) {
    if (!v('inputWeight')) return alert('請填寫投入重量'), false;
    const fruit = v('fruitType');
    if (fruit === '柚子') {
      if (!v('p_flesh') && !v('p_peel')) return alert('請填寫柚子分項重量'), false;
    } else if (fruit === '蘿蔔') {
      if (!v('r4')) return alert('請填寫最終產出重量'), false;
    } else {
      if (!v('outputWeight')) return alert('請填寫產出重量'), false;
    }
  }
  return true;
}

function v(id) { return (document.getElementById(id)?.value || '').trim(); }
function n(id) { return parseFloat(document.getElementById(id)?.value) || 0; }

function onFruitChange() {
  const fruit = v('fruitType');
  document.getElementById('normalOutput').classList.toggle('hidden', fruit === '柚子' || fruit === '蘿蔔');
  document.getElementById('pomeloSection').classList.toggle('hidden', fruit !== '柚子');
  document.getElementById('radishSection').classList.toggle('hidden', fruit !== '蘿蔔');
  document.getElementById('yieldBox').style.display = 'none';
}

function calcYield() {
  const input = n('inputWeight');
  if (!input) return;
  const fruit = v('fruitType');
  let output = fruit === '蘿蔔' ? n('r4') : n('outputWeight');
  if (!output) return;
  const rate = (output / input * 100).toFixed(1);
  showYield([{ label: '步留率', value: rate + '%' }, { label: '損耗', value: (input - output).toFixed(1) + ' kg' }]);
}

function calcPomelo() {
  const input = n('inputWeight');
  if (!input) return;
  const peel = n('p_peel'), neck = n('p_neck'), flesh = n('p_flesh'), waste = n('p_waste');
  const total = peel + neck + flesh + waste;
  const rows = [
    { label: '柚皮步留率', value: (peel / input * 100).toFixed(1) + '%' },
    { label: '柚脖步留率', value: (neck / input * 100).toFixed(1) + '%' },
    { label: '柚肉步留率', value: (flesh / input * 100).toFixed(1) + '%' },
    { label: '有效利用率', value: ((peel + neck + flesh) / input * 100).toFixed(1) + '%' },
    { label: '總損耗', value: (input - total).toFixed(1) + ' kg' }
  ];
  showYield(rows);
}

function showYield(rows) {
  const box = document.getElementById('yieldBox');
  box.style.display = 'block';
  document.getElementById('yieldContent').innerHTML = rows.map(r =>
    `<div class="yield-row"><span class="yield-label">${r.label}</span><span class="yield-value">${r.value}</span></div>`
  ).join('');
}

function toggleAnomaly() {
  document.getElementById('anomalyDetail').classList.toggle('hidden', v('hasAnomaly') === '否');
}

function buildSummary() {
  const fruit = v('fruitType');
  let rows = [
    ['批次編號', v('batchId')],
    ['處理日期', v('processDate')],
    ['原料種類', fruit],
    ['操作人員', v('operator')],
    ['投入重量', n('inputWeight') + ' kg'],
  ];
  if (fruit === '柚子') {
    rows.push(['柚皮', n('p_peel') + ' kg'], ['柚脖', n('p_neck') + ' kg'], ['柚肉', n('p_flesh') + ' kg']);
    const eff = ((n('p_peel') + n('p_neck') + n('p_flesh')) / n('inputWeight') * 100).toFixed(1);
    rows.push(['有效利用率', eff + '%']);
  } else if (fruit === '蘿蔔') {
    rows.push(['最終產出', n('r4') + ' kg'], ['步留率', (n('r4') / n('inputWeight') * 100).toFixed(1) + '%']);
  } else {
    rows.push(['產出重量', n('outputWeight') + ' kg'], ['步留率', (n('outputWeight') / n('inputWeight') * 100).toFixed(1) + '%']);
  }
  rows.push(['品質評等', v('quality')], ['有無異常', v('hasAnomaly')]);
  document.getElementById('summaryTable').innerHTML =
    '<tr><th>項目</th><th>數值</th></tr>' +
    rows.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('');
}

function getFormData() {
  const fruit = v('fruitType');
  const input = n('inputWeight');
  let outputWeight, yieldRate, details = {};

  if (fruit === '柚子') {
    const peel = n('p_peel'), neck = n('p_neck'), flesh = n('p_flesh'), waste = n('p_waste');
    outputWeight = peel + neck + flesh;
    yieldRate = (outputWeight / input * 100).toFixed(2);
    details = { peel_weight: peel, neck_weight: neck, flesh_weight: flesh, waste_weight: waste,
      peel_rate: (peel/input*100).toFixed(2), neck_rate: (neck/input*100).toFixed(2),
      flesh_rate: (flesh/input*100).toFixed(2), effective_rate: yieldRate };
  } else if (fruit === '蘿蔔') {
    outputWeight = n('r4');
    yieldRate = (outputWeight / input * 100).toFixed(2);
    details = { step1: n('r1'), step2: n('r2'), step3: n('r3'), final: n('r4') };
  } else {
    outputWeight = n('outputWeight');
    yieldRate = (outputWeight / input * 100).toFixed(2);
  }

  return {
    batch_id: v('batchId'),
    process_date: v('processDate'),
    fruit_type: fruit,
    operator: v('operator'),
    supplier: v('supplier'),
    grade: v('grade'),
    raw_condition: v('rawCondition'),
    origin: v('origin'),
    input_weight: input,
    output_weight: outputWeight,
    yield_rate: yieldRate,
    process_time: n('processTime'),
    quality: v('quality'),
    has_anomaly: v('hasAnomaly'),
    anomaly_text: v('anomalyText'),
    notes: (v('notes1') + ' ' + v('notes2')).trim(),
    pomelo_details: fruit === '柚子' ? details : null,
    radish_details: fruit === '蘿蔔' ? details : null,
    submit_time: new Date().toISOString()
  };
}

function setStatus(type, msg) {
  const bar = document.getElementById('statusBar');
  bar.className = 'status-bar show ' + type;
  bar.innerHTML = type === 'loading' ? `<span class="spinner"></span> ${msg}` : msg;
}

async function submitData() {
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  setStatus('loading', '正在寫入資料，請稍候...');

  try {
    const data = getFormData();
    const encoded = encodeURIComponent(JSON.stringify(data));
    const url = `${SCRIPT_URL}?action=write&data=${encoded}`;
    const res = await fetch(url, { method: 'GET' });
    const json = await res.json();

    if (json.status === 'ok') {
      setStatus('success', `✅ 寫入成功！批次 ${json.batchId} 已記錄至 Google Sheets`);
      btn.textContent = '✓ 已送出';
    } else {
      throw new Error(json.message || '寫入失敗');
    }
  } catch (err) {
    setStatus('error', `❌ 錯誤：${err.message}`);
    btn.disabled = false;
  }
}

// Init
document.getElementById('processDate').value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
