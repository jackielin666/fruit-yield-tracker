body{font-family:sans-serif;max-width:700px;margin:40px auto;padding:20px;background:#f0f4f8}
.card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.1);margin-bottom:16px}
h2{color:#1e3a8a;margin-bottom:6px}
.sub{color:#64748b;font-size:13px;margin-bottom:16px}
.warn{background:#fef3c7;border:1px solid #fcd34d;border-radius:8px;padding:12px;font-size:13px;margin-bottom:14px;color:#92400e}
.progress-wrap{margin:14px 0}
.prog-bg{background:#e2e8f0;border-radius:6px;height:12px;overflow:hidden;margin-bottom:6px}
.prog-fill{background:linear-gradient(90deg,#1e3a8a,#3b82f6);height:100%;border-radius:6px;transition:width .3s;width:0%}
.prog-lbl{font-size:12px;color:#64748b;font-family:monospace}
.log{background:#0f172a;color:#e2e8f0;border-radius:8px;padding:14px;font-size:12px;font-family:monospace;height:200px;overflow-y:auto;margin-top:12px}
.log-ok{color:#34d399}.log-err{color:#f87171}.log-info{color:#60a5fa}
.btn{width:100%;padding:14px;border-radius:9px;font-size:15px;font-weight:600;cursor:pointer;border:none;transition:all .2s;margin-bottom:8px}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-p{background:#1e3a8a;color:#fff}
.btn-p:hover{background:#1e40af}
.btn:disabled{background:#94a3b8;cursor:not-allowed}
.step{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f1f5f9;font-size:13px}
.step:last-child{border:none}
.step-num{width:24px;height:24px;border-radius:50%;background:#1e3a8a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.step-done .step-num{background:#15803d}
</style>

var current=0;
var logEl,progEl,progLbl;

function log(msg,cls){
  var line=document.createElement('div');
  line.className=cls||'';
  line.textContent=msg;
  logEl.appendChild(line);
  logEl.scrollTop=logEl.scrollHeight;
}

function setProgress(pct,lbl){
  progEl.style.width=pct+'%';
  progLbl.textContent=lbl;
}

function markStep(n){
  var el=document.getElementById('step'+n);
  if(el){el.classList.add('step-done');el.querySelector('.step-num').textContent='✓';}
}

async function startRebuild(){
  var btn=document.getElementById('btn-start');
  btn.disabled=true;btn.textContent='⏳ 重建中...';
  logEl=document.getElementById('log');
  progEl=document.getElementById('prog');
  progLbl=document.getElementById('prog-lbl');
  logEl.innerHTML='';

  log('🚀 開始重建資料庫...','log-info');
  log('目標分頁：'+SHEET_NAME,'log-info');

  // Step 1: Clear sheet via special action
  log('\n📋 Step 1: 清空主資料庫分頁...','log-info');
  setProgress(5,'清空分頁中...');
  try{
    var clearData={action:'clearSheet',sheetName:SHEET_NAME};
    var p1=new URLSearchParams();p1.append('data',JSON.stringify(clearData));
    var r1=await fetch(API,{method:'POST',body:p1});
    var t1=await r1.text();
    log('分頁清空完成','log-ok');
    markStep(1);
  }catch(e){
    log('清空失敗，繼續寫入（會覆蓋舊資料）：'+e.message,'log-err');
    markStep(1);
  }

  // Step 2: Write header
  log('\n📋 Step 2: 寫入標題列...','log-info');
  setProgress(10,'寫入標題列...');
  markStep(2);
  log('標題列將由 Apps Script 自動建立','log-ok');

  // Step 3: Write each batch
  log('\n📋 Step 3: 逐筆寫入資料...','log-info');
  var success=0,failed=0;

  for(var i=0;i<BATCHES.length;i++){
    var b=BATCHES[i];
    var pct=10+Math.round((i/BATCHES.length)*80);
    setProgress(pct,'寫入 '+b.batchId+' ('+（i+1)+'/'+BATCHES.length+')');

    // Add sheetName to direct to correct sheet
    var writeData=Object.assign({},b,{targetSheet:SHEET_NAME});
    var params=new URLSearchParams();
    params.append('data',JSON.stringify(writeData));

    try{
      var r=await fetch(API,{method:'POST',body:params});
      var t=await r.text();
      var res=JSON.parse(t);
      if(res.status==='ok'){
        log('✅ '+b.batchId+' '+b.fruit+' '+b.op+' 寫入成功','log-ok');
        success++;
      } else {
        log('❌ '+b.batchId+' 失敗：'+(res.message||'錯誤'),'log-err');
        failed++;
      }
    }catch(e){
      log('❌ '+b.batchId+' 例外：'+e.message,'log-err');
      failed++;
    }
    await new Promise(function(r){setTimeout(r,300)});
  }

  // Step 4: Done
  markStep(3);
  setProgress(100,'完成！');
  markStep(4);
  log('\n=============================','log-info');
  log('✅ 完成！成功：'+success+' 筆，失敗：'+failed+' 筆','log-ok');
  if(failed===0){
    log('🎉 所有資料已成功寫入主資料庫！','log-ok');
    btn.textContent='✅ 重建完成';
    btn.style.background='#15803d';
  } else {
    log('⚠️ 有 '+failed+' 筆失敗，請重試','log-err');
    btn.disabled=false;btn.textContent='🔄 重試';
  }
}
